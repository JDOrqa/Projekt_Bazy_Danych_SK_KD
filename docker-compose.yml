services:
  db:
    image: postgis/postgis:15-3.4
    container_name: wedkarz_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - wedkarz_network

  redis:
    image: redis:7-alpine
    container_name: wedkarz_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 64m
    networks:
      - wedkarz_network

  backend:
    build: ./backend
    container_name: wedkarz_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    mem_limit: 1536m
    networks:
      - wedkarz_network

  frontend:
    build: ./frontend
    container_name: wedkarz_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - NODE_OPTIONS=--max-old-space-size=1024
      - WATCHPACK_POLLING=false
      - CHOKIDAR_USEPOLLING=false
    restart: unless-stopped
    mem_limit: 1536m
    stdin_open: true
    networks:
      - wedkarz_network
    command: npm start

networks:
  wedkarz_network:
    driver: bridge

volumes:
  postgres_data:
  uploads: